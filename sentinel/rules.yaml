# Seed regex rules — step 3 of the categorizer cascade (SPEC §3).
# Python regexes, matched with re.search against the NORMALIZED merchant name
# (already uppercased). First match wins. Categories must be in the fixed
# taxonomy (validated at load). Learned mappings live in merchant_map.json,
# not here — this file is only the seed.
rules:
  - pattern: "\\b(TESCO|LIDL|ALDI|DUNNES|SUPERVALU|CENTRA|SPAR|MACE|DAYBREAK|GALA|COSTCUTTER|MARKS & SPENCER)\\b|BUYMIE"
    category: Groceries
  # Food delivery → FoodDelivery. MUST precede the generic UBER->Transport rule
  # below (first match wins), so "UBER * EATS" is food, not a ride.
  - pattern: "UBER ?\\*? ?EATS|UBEREATS|DELIVEROO|JUST ?EAT"
    category: FoodDelivery
  - pattern: "\\bUBR\\* ?PENDING|PENDING\\.UBER"   # Uber RIDES settle under this auth string (owner-confirmed); Eats posts separately as "UBER * EATS"
    category: Transport
  - pattern: "\\b(LEAP|FREE ?NOW|IRISH RAIL|IARNROD EIREANN|LUAS|DUBLIN BUS|BUS EIREANN|UBER|BOLT)\\b"
    category: Transport
  - pattern: "\\bANTHROPIC\\b|CLAUDE"
    category: Tools
  - pattern: "\\bBJJ\\b|JIU ?JITSU|JUDO|GRACIE BARRA|FLYEFIT|\\bGYM\\b|\\bBOOTS\\b|CHEMIST WAREHO|LLOYDS PHARMAC|HEALTHCARE NOW|MYMIND"
    category: Health/Fitness
  - pattern: "NETFLIX|SPOTIFY|DISNEY|YOUTUBE|APPLE\\.COM/BILL|ICLOUD|AMAZON PRIME|AUDIBLE|\\bGOOGLE\\b|OPENAI|CHATGPT"
    category: Subscriptions
  # National retail chains → Shopping.
  - pattern: "\\b(PENNEYS|PRIMARK|NIKE|ADIDAS|BERSHKA|ZARA|STRADIVARIUS|JD|WATERSTONES|WH ?SMITH|EASONS?|HOLLAND (AND|&) BA)\\b|THE CARD SHOP"
    category: Shopping
  # National telecom / energy utilities → Utilities.
  - pattern: "BORD GAIS|ELECTRIC IRELAND|SSE AIRTRICITY|\\bENERGIA\\b|VIRGIN MEDIA|VODAFO|\\bEIR\\b|PINERGY"
    category: Utilities
  # National coffee / snack chains and vending → Coffee/Snacks.
  - pattern: "INSOMNIA|AUNTIE ANNE|\\bCOSTA\\b|STARBUCKS|BEHAN VENDING|COREVEND"
    category: Coffee/Snacks
  # Catering / staff canteen (COMPASS = Compass Group) → Dining.
  - pattern: "\\bCOMPASS\\b"
    category: Dining
  # National cinema chains → Dates.
  - pattern: "\\b(ODEON|OMNIPLEX|CINEWORLD|IMC)\\b"
    category: Dates
  # Chocolatier / card & gift shops → Gifts.
  - pattern: "BUTLERS CHOCOL|CARD FACTORY|\\bHALLMARK\\b"
    category: Gifts
  # Fuel / forecourt convenience (fuel is the dominant use) → Transport.
  - pattern: "CIRCLE K|\\bAPPLEGREEN\\b|\\bMAXOL\\b|TOP OIL"
    category: Transport
  # Foreign-exchange / remittance kiosks → Cash.
  - pattern: "EBIXCASH"
    category: Cash
  # Cash lodgements are INFLOWS (cash into the account), not spend: Transfers
  # keeps them out of the spend buckets. Labeled "Cash" they'd land in the Other
  # bucket and NET against the discretionary pool, inflating safe-to-spend —
  # sidestepping the unlabeled-inflow hold-out because they'd carry a label.
  # MUST precede the ATM rule: "ATM LODGEMENT" is a lodgement, not a withdrawal.
  - pattern: "LODGEMENT|CASH LODGE"
    category: Transfers
  - pattern: "\\bATM\\b|CASH WITHDRAWAL"
    category: Cash
  - pattern: "\\bSALARY\\b|PAYROLL|\\bPAYE\\b"
    category: Income
  - pattern: "^(TO|FROM) A/?C\\b|FAMILY TRANSFER"
    category: Transfers
  # Owner-specific patterns (employer, landlord, family, local businesses) live
  # in the git-ignored rules.local.yaml, merged AHEAD of these at load so they
  # match first. Never put personal names in this committed file.
  - pattern: "\\bFEES?\\b|BANK CHARGES|GOVT STAMP DUTY"
    category: Fees
