name: ci

on:
  push:
  pull_request:

# Least privilege: the default GITHUB_TOKEN is write-scoped; this job only reads.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # Third-party actions are pinned to commit SHAs (not moving tags) — a repo
      # that leads with gitleaks shouldn't trust a tag it doesn't control.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0          # gitleaks scans full history
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6.8.0
      - run: uv sync --dev
      - name: lint (ruff)
        run: uv run ruff check .
      - name: types (mypy)
        run: uv run mypy sentinel
      - name: tests + coverage (gated at 80%)
        run: uv run pytest -q --cov=sentinel --cov-report=term-missing --cov-fail-under=80
      # gitleaks-action scans the push range `<base>^..<head>`, but a repo's root
      # commit has no `<base>^`, so the initial push fails with "unknown revision".
      # Run the pinned binary directly instead: `detect` scans the full history
      # from the root, so it is correct on the first push and every push after.
      - name: secret scan (gitleaks, full history)
        env:
          GITLEAKS_VERSION: "8.24.3"
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --redact --exit-code 2 -v
