name: ci

on:
  push:
  pull_request:

# Least privilege: the default GITHUB_TOKEN is write-scoped; this job only reads.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # Third-party actions are pinned to commit SHAs (not moving tags) — a repo
      # that leads with gitleaks shouldn't trust a tag it doesn't control.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0          # gitleaks scans full history
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6.8.0
      - run: uv sync --dev
      - name: lint (ruff)
        run: uv run ruff check .
      - name: types (mypy)
        run: uv run mypy sentinel
      - name: tests + coverage (gated at 80%)
        run: uv run pytest -q --cov=sentinel --cov-report=term-missing --cov-fail-under=80
      - name: secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
